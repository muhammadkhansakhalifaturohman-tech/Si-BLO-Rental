<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="topbar" class="topbar">
    <div class="search-bar">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor" style="color: var(--color-text-secondary);"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        <input type="text" id="searchInput" placeholder="Search courts, locations, or sports..." onkeydown="if(event.key==='Enter'){window.location.href='/home?search='+encodeURIComponent(this.value)}">
    </div>

    <div class="topbar-actions">
        <button class="notification-btn" aria-label="Notifications" onclick="alert('No new notifications at this time.')">
            <svg width="16" height="20" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/></svg>
            <span class="notification-dot"></span>
        </button>
        <button class="notification-btn" aria-label="Messages" onclick="alert('No messages at this time.')">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 5v8a2 2 0 01-2 2h-5l-5 4v-4H4a2 2 0 01-2-2V5a2 2 0 012-2h12a2 2 0 012 2zM7 8H5v2h2V8zm2 0h2v2H9V8zm6 0h-2v2h2V8z" clip-rule="evenodd"/></svg>
        </button>
        <a th:href="@{/booking}" class="btn-quick-book">Quick Book</a>
        <div id="userMenu" style="display: none; align-items: center; gap: var(--space-3);">
            <span id="userName" style="font-size: 14px; font-weight: 600;"></span>
            <button onclick="logout()" style="background: rgba(255,255,255,0.1); border: 1px solid var(--color-border-default); color: var(--color-text-secondary); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px;">Logout</button>
        </div>
    </div>
</header>
<script>
(function() {
    const token = localStorage.getItem('token');
    if (token) {
        try {
            const parts = token.split('.');
            if (parts.length === 3) {
                const payload = JSON.parse(atob(parts[1]));
                const name = payload.name || payload.sub || 'User';
                document.getElementById('userName').textContent = name;
                document.getElementById('userMenu').style.display = 'flex';
            }
        } catch(e) {}
    }
})();
function logout() {
    localStorage.removeItem('token');
    window.location.href = '/login';
}
</script>
</body>
</html>
