<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activePage)" class="sidebar">
    <div class="sidebar-brand">SI-BLO</div>
    <div class="sidebar-tagline">Pro Court Rentals</div>

    <nav class="sidebar-nav">
        <a th:href="@{/}" th:classappend="${activePage == 'home'} ? 'nav-item active' : 'nav-item'">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7A1 1 0 003 11h1v6a1 1 0 001 1h4a1 1 0 001-1v-4h2v4a1 1 0 001 1h4a1 1 0 001-1v-6h1a1 1 0 00.707-1.707l-7-7z"/></svg>
            Home
        </a>
        <a th:href="@{/booking}" th:classappend="${activePage == 'booking'} ? 'nav-item active' : 'nav-item'">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zM4 8h12v8H4V8z" clip-rule="evenodd"/></svg>
            Book a Court
        </a>
        <a id="navBookings" th:href="@{/my-bookings}" th:classappend="${activePage == 'my-bookings'} ? 'nav-item active' : 'nav-item'">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
            My Bookings
        </a>
        <a id="navAdmin" th:href="@{/manage-admin}" th:classappend="${activePage == 'admin'} ? 'nav-item active' : 'nav-item'">
            <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>
            Admin Management
        </a>
    </nav>

    <a href="https://wa.me/6281586634261" target="_blank" class="btn-support" style="text-decoration: none;">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-2 0c0 .993-.241 1.929-.668 2.754l-1.524-1.525a3.997 3.997 0 00.078-2.183l1.562-1.562C15.802 8.249 16 9.1 16 10zm-5.5 4.002A10.004 10.004 0 0010 14c-2.236 0-4.26.779-5.865 2.06A7.987 7.987 0 0010 18a7.987 7.987 0 005.865-2.94c-.457-.35-2.365-1.058-5.365-1.058zm-5.59-2.045a3.98 3.98 0 002.102-3.464c0-.787.213-1.524.585-2.156L5.56 6.382A3.992 3.992 0 005 8c0 1.074.267 2.085.73 2.972l-1.82 1.82zm2.884-8.872A4.003 4.003 0 0010 4c1.268 0 2.424.589 3.17 1.496l-1.522 1.522A1.998 1.998 0 0010 6c-.584 0-1.11.251-1.475.65L5.794 5.085z" clip-rule="evenodd"/></svg>
        Chat
    </a>

    <div class="sidebar-profile" id="sidebarProfile" style="margin-top: var(--space-3); display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) 0; border-top: 1px solid var(--color-border-subtle); cursor: pointer; position: relative;" onclick="toggleProfileDropdown()">
        <div class="avatar admin-avatar-ring" id="profileAvatar" style="background: var(--color-bg-elevated); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--color-text-tertiary);">JD</div>
        <div>
            <div id="profileName" style="font-size: 14px; font-weight: 600; color: var(--color-text-tertiary);">John Doe</div>
            <div id="profileTier" style="font-size: 10px; font-weight: 700; color: var(--color-accent-primary); text-transform: uppercase; letter-spacing: 1px;">PREMIUM MEMBER</div>
        </div>
        <!-- Profile Dropdown -->
        <div id="profileDropdown" style="display: none; position: absolute; bottom: 100%; left: 0; margin-bottom: 4px; background: var(--color-bg-elevated); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-md); padding: var(--space-2); min-width: 200px; z-index: 200; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
            <div style="display: flex; flex-direction: column; gap: 2px;">
                <a href="#" onclick="event.preventDefault(); hideProfileDropdown(); showProfileModal();" style="display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); text-decoration: none; color: var(--color-text-primary); font-size: 14px;">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
                    Profile Settings
                </a>
                <a href="#" onclick="event.preventDefault(); hideProfileDropdown(); showChangePasswordModal();" style="display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); text-decoration: none; color: var(--color-text-primary); font-size: 14px;">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                    Change Password
                </a>
                <a href="/login" onclick="localStorage.removeItem('token'); localStorage.removeItem('user');" style="display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); text-decoration: none; color: var(--color-text-danger); font-size: 14px;">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
                    Logout
                </a>
            </div>
        </div>
    </div>

    <!-- Profile Settings Modal -->
    <div id="profileModal" style="display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.6); align-items: center; justify-content: center;">
        <div class="card" style="width: 440px; padding: var(--space-6);">
            <h3 style="font-family: 'Anybody', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: var(--space-5);">Profile Settings</h3>
            <form id="profileForm" onsubmit="submitProfile(event)">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" id="profileNameInput" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" id="profileEmailInput" required>
                </div>
                <div style="display: flex; gap: var(--space-4); margin-top: var(--space-5);">
                    <button type="submit" class="btn-primary" style="padding: 12px 32px;">Save</button>
                    <button type="button" class="btn-secondary" style="padding: 12px 32px;" onclick="hideProfileModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="changePasswordModal" style="display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.6); align-items: center; justify-content: center;">
        <div class="card" style="width: 440px; padding: var(--space-6);">
            <h3 style="font-family: 'Anybody', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: var(--space-5);">Change Password</h3>
            <form id="passwordForm" onsubmit="submitPasswordChange(event)">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" name="oldPassword" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirmPassword" required>
                </div>
                <p id="passwordError" style="color: var(--color-accent-secondary); font-size: 13px; display: none;"></p>
                <div style="display: flex; gap: var(--space-4); margin-top: var(--space-5);">
                    <button type="submit" class="btn-primary" style="padding: 12px 32px;">Change Password</button>
                    <button type="button" class="btn-secondary" style="padding: 12px 32px;" onclick="hideChangePasswordModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    function toggleProfileDropdown() {
        const dd = document.getElementById('profileDropdown');
        dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
    }
    function hideProfileDropdown() {
        document.getElementById('profileDropdown').style.display = 'none';
    }
    function showProfileModal() {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('profileNameInput').value = user.name || '';
        document.getElementById('profileEmailInput').value = user.email || '';
        document.getElementById('profileModal').style.display = 'flex';
    }
    function hideProfileModal() {
        document.getElementById('profileModal').style.display = 'none';
    }
    function submitProfile(event) {
        event.preventDefault();
        const token = localStorage.getItem('token');
        if (!token) { alert('Please login first'); return; }
        const data = {
            name: document.getElementById('profileNameInput').value,
            email: document.getElementById('profileEmailInput').value
        };
        fetch('/api/auth/profile', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(data)
        })
        .then(r => {
            if (!r.ok) return r.json().then(e => { throw new Error(e.error || 'Update failed'); });
            return r.json();
        })
        .then(user => {
            localStorage.setItem('user', JSON.stringify(user));
            updateSidebarProfile(user);
            hideProfileModal();
            alert('Profile updated!');
        })
        .catch(err => alert(err.message));
    }
    function showChangePasswordModal() {
        document.getElementById('changePasswordModal').style.display = 'flex';
        document.getElementById('passwordForm').reset();
        document.getElementById('passwordError').style.display = 'none';
    }
    function hideChangePasswordModal() {
        document.getElementById('changePasswordModal').style.display = 'none';
    }
    function submitPasswordChange(event) {
        event.preventDefault();
        const form = event.target;
        if (form.newPassword.value !== form.confirmPassword.value) {
            document.getElementById('passwordError').textContent = 'New passwords do not match.';
            document.getElementById('passwordError').style.display = 'block';
            return;
        }
        const token = localStorage.getItem('token');
        if (!token) { alert('Please login first'); return; }
        fetch('/api/auth/password', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ oldPassword: form.oldPassword.value, newPassword: form.newPassword.value })
        })
        .then(r => {
            if (!r.ok) return r.json().then(e => { throw new Error(e.error || 'Change failed'); });
            return r.json();
        })
        .then(() => {
            hideChangePasswordModal();
            alert('Password changed successfully!');
        })
        .catch(err => alert(err.message));
    }
    function updateSidebarProfile(user) {
        document.getElementById('profileName').textContent = user.name || 'User';
        document.getElementById('profileTier').textContent = user.membershipTier || 'MEMBER';
        const initials = (user.name || 'U').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        document.getElementById('profileAvatar').textContent = initials;
    }
    document.addEventListener('DOMContentLoaded', function() {
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.name) updateSidebarProfile(user);
        if (user.role !== 'ADMIN') {
            const el = document.getElementById('navAdmin');
            if (el) el.style.display = 'none';
        } else {
            const el = document.getElementById('navBookings');
            if (el) el.innerHTML = el.innerHTML.replace('My Bookings', 'Users Bookings');
        }
    });
    </script>
</aside>
