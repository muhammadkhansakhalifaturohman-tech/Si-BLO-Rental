<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Register')}">
    <link rel="stylesheet" href="/css/siblo.css">
</head>
<body class="login-page">
    <div class="login-card glass">
        <h1>SI-BLO</h1>
        <p class="tagline">Create Your Account</p>

        <!-- STEP 1: Form Register -->
        <form id="registerForm" onsubmit="handleRegister(event)" style="display:block;">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required minlength="6">
            </div>
            <button type="submit" class="btn-primary" id="registerBtn">Register</button>
        </form>

        <!-- STEP 2: Form OTP (hidden dulu) -->
        <form id="otpForm" onsubmit="handleVerifyOtp(event)" style="display:none;">
            <p style="color: var(--color-text-secondary); margin-bottom: var(--space-4); text-align: center;">
                Kode OTP telah dikirim ke<br>
                <strong id="otpEmailLabel" style="color: var(--color-text-primary);"></strong>
            </p>
            <div class="form-group">
                <label>Kode OTP</label>
                <input type="text" name="otp" placeholder="Masukkan 6 digit kode OTP"
                    required maxlength="6" pattern="[0-9]{6}"
                    style="letter-spacing: 8px; font-size: 24px; text-align: center; font-weight: 700;">
            </div>
            <button type="submit" class="btn-primary" id="verifyBtn">Verifikasi OTP</button>
            <button type="button" class="btn-secondary" onclick="resendOtp()"
                id="resendBtn" style="width: 100%; margin-top: var(--space-3);">
                Kirim Ulang OTP
            </button>
            <button type="button" onclick="backToRegister()"
                style="width: 100%; margin-top: var(--space-2); background: none; border: none;
                color: var(--color-text-secondary); cursor: pointer; font-size: 14px;">
                ← Kembali ubah data
            </button>
        </form>

        <p class="register-link" style="margin-top: var(--space-4);">
            Already have an account? <a href="/login">Sign In</a>
        </p>
    </div>

    <script>
    let pendingEmail = '';
    let pendingName = '';
    let pendingPassword = '';

    async function handleRegister(event) {
        event.preventDefault();
        const form = event.target;
        const btn = document.getElementById('registerBtn');
        btn.disabled = true;
        btn.textContent = 'Mengirim OTP...';

        pendingEmail = form.email.value;
        pendingName = form.name.value;
        pendingPassword = form.password.value;

        try {
            const res = await fetch('/api/auth/register/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: pendingName,
                    email: pendingEmail,
                    password: pendingPassword
                })
            });
            const data = await res.json();

            if (!res.ok) {
                alert(data.error || 'Gagal mengirim OTP.');
                btn.disabled = false;
                btn.textContent = 'Register';
                return;
            }

            // Tampilkan form OTP, sembunyikan form register
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('otpForm').style.display = 'block';
            document.getElementById('otpEmailLabel').textContent = pendingEmail;

        } catch (err) {
            alert('Gagal mengirim OTP. Coba lagi.');
            btn.disabled = false;
            btn.textContent = 'Register';
        }
    }

    async function handleVerifyOtp(event) {
        event.preventDefault();
        const form = event.target;
        const btn = document.getElementById('verifyBtn');
        btn.disabled = true;
        btn.textContent = 'Memverifikasi...';

        try {
            const res = await fetch('/api/auth/register/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: pendingEmail,
                    otp: form.otp.value
                })
            });
            const data = await res.json();

            if (!res.ok) {
                alert(data.error || 'Kode OTP salah atau expired.');
                btn.disabled = false;
                btn.textContent = 'Verifikasi OTP';
                return;
            }

            // OTP valid, akun berhasil dibuat
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data));
            alert('Registrasi berhasil! Selamat datang, ' + data.name + '!');
            window.location.href = '/';

        } catch (err) {
            alert('Verifikasi gagal. Coba lagi.');
            btn.disabled = false;
            btn.textContent = 'Verifikasi OTP';
        }
    }

    async function resendOtp() {
        const btn = document.getElementById('resendBtn');
        btn.disabled = true;
        btn.textContent = 'Mengirim ulang...';

        try {
            const res = await fetch('/api/auth/register/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: pendingName,
                    email: pendingEmail,
                    password: pendingPassword
                })
            });

            if (res.ok) {
                alert('OTP baru telah dikirim ke ' + pendingEmail);
            } else {
                alert('Gagal kirim ulang OTP.');
            }
        } catch (err) {
            alert('Gagal kirim ulang OTP.');
        }

        btn.disabled = false;
        btn.textContent = 'Kirim Ulang OTP';
    }

    function backToRegister() {
        document.getElementById('otpForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('registerBtn').disabled = false;
        document.getElementById('registerBtn').textContent = 'Register';
    }
    </script>
</body>
</html>
