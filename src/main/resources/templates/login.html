<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}">
    <link rel="stylesheet" href="/css/siblo.css">
</head>
<body class="login-page">
    <div class="login-card glass">
        <h1>SI-BLO</h1>
        <p class="tagline">Pro Court Rentals</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <p class="register-link" style="margin-top: var(--space-4);">
            Don't have an account? <a href="/register">Register</a>
        </p>

        <div style="margin-top: var(--space-5); padding-top: var(--space-4); border-top: 1px solid var(--color-border-subtle); font-size: 12px; color: var(--color-text-secondary);">
            <p><strong>Demo accounts:</strong></p>
            <p>Admin: admin@siblo.com / admin123</p>
            <p>Member: john@siblo.com / john123</p>
        </div>
    </div>

    <script>
    function handleLogin(event) {
        event.preventDefault();
        const form = event.target;

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: form.email.value,
                password: form.password.value
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data));
                window.location.href = '/';
            } else {
                alert('Login failed: ' + (data.error || 'Invalid credentials'));
            }
        })
        .catch(() => {
            alert('Login failed. Please check your credentials.');
        });
    }
    </script>
</body>
</html>
