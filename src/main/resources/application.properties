spring.application.name=siblo-rent

# PostgreSQL (default — overridable via env vars or profile)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:db_siblo}?sslmode=require
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# JWT
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# Booking config
app.booking.payment-timeout-minutes=15
app.booking.cancel-cutoff-hours=24

# Scheduling (fix1)
app.scheduling.slot-horizon-days=14
app.scheduling.slot-extend-cron=0 0 1 * * *
app.scheduling.payment-expiry-fixed-rate-ms=60000
app.scheduling.lifecycle-fixed-rate-ms=300000
app.scheduling.date-scroller-days=14

# Midtrans
midtrans.server-key=${MIDTRANS_SERVER_KEY:}
midtrans.client-key=${MIDTRANS_CLIENT_KEY:}
midtrans.is-production=${MIDTRANS_IS_PRODUCTION:false}

# Brevo API
brevo.api.key=${BREVO_API_KEY:}
brevo.mail.from=${BREVO_MAIL_FROM:}
brevo.mail.from-name=${BREVO_MAIL_SI-BLO:}
