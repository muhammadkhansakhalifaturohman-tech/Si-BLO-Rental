spring.application.name=siblo-rent
spring.profiles.include=local

# PostgreSQL (Laragon local)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_siblo
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false

# JWT
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# Booking config
app.booking.payment-timeout-minutes=15
app.booking.cancel-cutoff-hours=24

# Scheduling (fix1)
app.scheduling.slot-horizon-days=14
app.scheduling.slot-extend-cron=0 0 1 * * *
app.scheduling.payment-expiry-fixed-rate-ms=60000
app.scheduling.lifecycle-fixed-rate-ms=300000
app.scheduling.date-scroller-days=14

# Midtrans — set env vars on Railway / production
midtrans.server-key=${MIDTRANS_SERVER_KEY:}
midtrans.client-key=${MIDTRANS_CLIENT_KEY:}
midtrans.is-production=${MIDTRANS_IS_PRODUCTION:false}

# Gmail SMTP — set env vars on Railway / production
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
