# Railway / Production overrides

spring.thymeleaf.cache=true
seed.enabled=${SEED_ENABLED:false}

app.jwt.secret=${JWT_SECRET}

midtrans.server-key=${MIDTRANS_SERVER_KEY}
midtrans.client-key=${MIDTRANS_CLIENT_KEY}
midtrans.is-production=${MIDTRANS_IS_PRODUCTION}

spring.mail.host=${MAIL_HOST:smtp.sendgrid.net}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:apikey}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=true
app.mail.from=${MAIL_FROM}
