spring.application.name=siblo-rent

# PostgreSQL (Railway injects PGHOST, PGPORT, PGDATABASE, PGUSER, PGPASSWORD)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Booking config
app.booking.payment-timeout-minutes=15
app.booking.cancel-cutoff-hours=24

# Scheduling (fix1)
app.scheduling.slot-horizon-days=14
app.scheduling.slot-extend-cron=0 0 1 * * *
app.scheduling.payment-expiry-fixed-rate-ms=60000
app.scheduling.lifecycle-fixed-rate-ms=300000
app.scheduling.date-scroller-days=14

# Midtrans
midtrans.server-key=${MIDTRANS_SERVER_KEY}
midtrans.client-key=${MIDTRANS_CLIENT_KEY}
midtrans.is-production=${MIDTRANS_IS_PRODUCTION}

# Gmail SMTP
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
