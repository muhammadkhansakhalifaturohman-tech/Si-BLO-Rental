# H2 for self-contained tests
spring.datasource.url=jdbc:h2:mem:test_siblo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.thymeleaf.cache=false

app.jwt.secret=test-secret-key-that-is-long-enough-for-hs256-algorithm
app.jwt.expiration-ms=86400000

app.booking.payment-timeout-minutes=15
app.booking.cancel-cutoff-hours=24

seed.enabled=true

midtrans.server-key=SB-Mid-test-fake
midtrans.client-key=SB-Mid-test-fake
midtrans.is-production=false

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
